# ═══════════════════════════════════════════════════════════════
#  Tofu (豆腐) — Continuous Integration
# ═══════════════════════════════════════════════════════════════
#
#  Runs on every push to main and on all pull requests.
#  Jobs: lint → test-unit → test-api → healthcheck
#
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TRADING_ENABLED: "0"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # ── Lint ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check lib/ routes/ tests/

  # ── Unit Tests ───────────────────────────────────────────────
  test-unit:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: >
          python -m pytest -m unit
          --cov=lib --cov=routes
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --tb=short -q

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
          if-no-files-found: ignore

  # ── API Integration Tests ───────────────────────────────────
  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    # No service containers needed — SQLite is built into Python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run API tests
        run: >
          python -m pytest -m api
          --cov=lib --cov=routes
          --cov-report=term-missing
          --tb=short -q

  # ── Healthcheck ─────────────────────────────────────────────
  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run healthcheck
        run: python healthcheck.py

  # ── Pricing-Tier Tag Drift Check ────────────────────────────
  #
  # Fails the build if any committed `capabilities` array under
  # static/provider_templates/*.json or lib/llm_dispatch/config.py's
  # DEFAULT_SLOT_CONFIGS disagrees with what reevaluate_pricing_tags()
  # would compute from live MODEL_PRICING.  Run locally to fix:
  #     python3 debug/reeval_pricing_tags.py
  pricing-tags:
    name: Pricing-Tier Tag Drift
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check pricing-tier tags against MODEL_PRICING
        run: python3 debug/reeval_pricing_tags.py --check
