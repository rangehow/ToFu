<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    h1 { font-size: 14px; margin-bottom: 12px; color: #a78bfa; display: flex; align-items: center; gap: 8px; }
    h1 .version { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 8px; color: #888; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 8px; background: #16213e; border-radius: 8px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.connected { background: #4ade80; }
    .status-dot.disconnected { background: #888; }
    .status-text { font-size: 13px; }
    label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    .input-row { display: flex; gap: 6px; margin-bottom: 12px; }
    input { flex: 1; padding: 6px 8px; border: 1px solid #333; border-radius: 6px; background: #0f0f23; color: #e0e0e0; font-size: 12px; }
    input:focus { outline: none; border-color: #a78bfa; }
    button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-save { background: #a78bfa; color: white; }
    .btn-save:hover { background: #8b5cf6; }
    .btn-toggle { background: #333; color: #e0e0e0; width: 100%; margin-bottom: 8px; }
    .btn-toggle:hover { background: #444; }
    #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 11px; color: #888; padding: 8px; background: #16213e; border-radius: 8px; }
    #stats div { padding: 2px 0; }
    .footer { margin-top: 12px; font-size: 10px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <h1>✦ ChatUI Browser Bridge <span class="version">v4.2</span></h1>

  <div class="status-row">
    <div id="statusDot" class="status-dot disconnected"></div>
    <span id="statusText" class="status-text">Checking...</span>
  </div>

  <div id="clientIdRow" style="margin-bottom: 8px; padding: 4px 8px; background: #16213e; border-radius: 6px; font-size: 11px; color: #888; display: flex; align-items: center; gap: 6px;">
    <span>🆔</span>
    <span id="clientIdText" style="font-family: monospace; color: #a78bfa; user-select: all;">—</span>
  </div>

  <label>Server URL</label>
  <div class="input-row">
    <input id="serverUrl" type="text" placeholder="http://localhost:15000">
    <button id="saveBtn" class="btn-save">Save</button>
  </div>

  <button id="toggleBtn" class="btn-toggle">⏸ Pause</button>

  <div id="stats"></div>

  <div class="footer">Per-client routing • Proxy-safe</div>

  <script src="popup.js"></script>
</body>
</html>
